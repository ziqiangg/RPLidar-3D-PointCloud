# Raspberry Pi Scanner Service Configuration

mqtt:
  broker_host: ""  # Laptop IP address CHANGE ACCORDINGLY
  broker_port: 1883
  qos: 1
  
device:
  role: "scanner"
  client_id: "rplidar_scanner_rpi"
  default_port: "/dev/ttyUSB0"  # Linux default
  
# scripts:
#   scan_2d: "./dump_one_scan.py"
  
data:
  output_dir: "./data"
  formats: ["csv", "ply"]  # Generate both formats

servo:
  # Using Pico W as serial servo controller
  serial_port: "auto"  # Auto-detect Pico serial port (recommended)
  baudrate: 115200
  timeout: 8.0               # Extra margin for first command after USB reset/reconnect
  settle_time: 0.5             # Wait time after "DONE" before scan starts

scan3d:
  # 3D scan configuration (91 inclusive steps across 0..180 = 2° spacing)
  sweep_start: 0
  sweep_end: 180
  num_steps: 91         # Total number of servo angles (includes 0 and 180)
  park_after_scan: true  # Back off slightly from the final angle before disconnect
  park_target_deg: 5.0   # Preferred: park near the next scan start so the following run only makes a small move
  park_backoff_deg: 5.0  # Fallback when park_target_deg is unset
  park_settle_time: 0.25
  # Per-slice scan quality parameters (optimized for maximum coverage)
  min_angle_resolution: 1.0  # 1-degree bins for finer resolution
  min_coverage: 0.70  # Target 70% coverage (252° of 360°)
  relaxed_max_gap: 15.0  # Maximum acceptable gap between points (degrees)
  max_scans_to_merge: 40  # Merge up to 40 scans for dense coverage
  plateau_patience: 10  # Wait for 10 plateau iterations before accepting
  slice_timeout: 60.0  # 60 seconds per slice for thorough coverage
  lidar_timeout: 3.0
  progress_every_slices: 1
  min_distance_mm: 50  # Filter points closer than 50mm
  min_quality: 10  # Minimum quality threshold (0-15 scale)
  motor_pwm: 300  # Motor speed (0-1023, default=660, lower=slower=denser scans)
  worker_stall_timeout: 20.0
  buffer_size: 5000
  # Final cloud processing on RP5 before MQTT transfer
  save_slice_files: false   # Keep per-slice debug PLY files locally if true
  sor_neighbors: 12         # Statistical outlier filtering neighborhood size
  sor_std_ratio: 1.0        # Larger keeps more points; smaller removes more outliers
  sor_radius_m: 0.08        # Local neighborhood radius in meters for SOR
  sor_max_points: 12000     # Automatic cutoff: skip SOR when point count exceeds this
  sor_max_runtime_s: 2.5    # Automatic cutoff: abort SOR if it exceeds this runtime
  voxel_size_m: 0.01        # Voxel grid size in meters for downsampling

panorama:
  # Inherit robust_3d sweep bounds by default, then clamp panorama to max_panorama_deg.
  inherit_scan3d_sweep: true
  max_panorama_deg: 160
  start_deg: 0
  end_deg: 160
  step_deg: 20
  # Servo timing profile for stable 30-degree jumps.
  home_settle_time: 1.5
  step_settle_time: 1.0
  step_dwell_time: 0.35
  # Servo I/O recovery controls.
  servo_io_retries: 2
  servo_reconnect_delay: 0.5
  servo_angle_tolerance_deg: 2.0
  # Webcam discovery/capture controls.
  # Use stable capture alias (index0 is video stream, index1 is metadata for this webcam).
  camera_index: /dev/v4l/by-id/usb-046d_081b_DDCCCA90-video-index0
  # Second webcam facing opposite direction (must be explicit in dual-camera mode).
  camera_secondary_index: /dev/v4l/by-id/usb-046d_081b_13D1CA90-video-index0
  camera_probe_count: 1
  camera_fast_reopen_only_attempts: 1
  camera_healthcheck_retries: 1
  camera_healthcheck_wait: 0.15
  camera_strict_preferred_source: true
  camera_allow_cap_any_fallback: false
  camera_init_time: 1.5
  camera_warmup_frames: 12
  camera_capture_retries: 2
  camera_step_retries: 3
  camera_step_retry_wait: 1.00
  camera_flush_frames: 6
  camera_post_move_flush_s: 0.35
  camera_post_move_wait: 0.20
  camera_reopen_retries: 2
  camera_reopen_wait: 0.50
  image_format: jpg
  image_quality: 90
  image_width: 1280
  image_height: 720
  
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "./rpi_scanner.log"

segmentation:
  enabled: true
  checkpoint: "segmentation/Randlanet S3DIS Jan 7 2022.pth"
  output_dir: "./data/randla_inference_output"
  grid_size: 0.01
  num_points: 4096
  axis_remap: true
