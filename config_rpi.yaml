# Raspberry Pi Scanner Service Configuration

mqtt:
  broker_host: ""  # Laptop IP address CHANGE ACCORDINGLY
  broker_port: 1883
  qos: 1
  
device:
  role: "scanner"
  client_id: "rplidar_scanner_rpi"
  default_port: "/dev/ttyUSB0"  # Linux default
  
# scripts:
#   scan_2d: "./dump_one_scan.py"
  
data:
  output_dir: "./data"
  formats: ["csv", "ply"]  # Generate both formats

servo:
  # Using Pico W as serial servo controller
  serial_port: "auto"  # Auto-detect Pico serial port (recommended)
  baudrate: 115200
  timeout: 8.0               # Extra margin for first command after USB reset/reconnect
  settle_time: 0.5             # Wait time after "DONE" before scan starts

scan3d:
  # 3D scan configuration (9 steps × 20° physical = 180° sweep)
  sweep_start: 0
  sweep_end: 180
  num_steps: 35          # Total number of servo steps
  # Per-slice scan quality parameters (optimized for maximum coverage)
  min_angle_resolution: 1.0  # 1-degree bins for finer resolution
  min_coverage: 0.70  # Target 70% coverage (252° of 360°)
  relaxed_max_gap: 15.0  # Maximum acceptable gap between points (degrees)
  max_scans_to_merge: 40  # Merge up to 40 scans for dense coverage
  plateau_patience: 10  # Wait for 10 plateau iterations before accepting
  slice_timeout: 60.0  # 60 seconds per slice for thorough coverage
  lidar_timeout: 3.0
  progress_every_slices: 1
  min_distance_mm: 50  # Filter points closer than 50mm
  min_quality: 10  # Minimum quality threshold (0-15 scale)
  motor_pwm: 300  # Motor speed (0-1023, default=660, lower=slower=denser scans)
  worker_stall_timeout: 20.0
  buffer_size: 5000
  # Final cloud processing on RP5 before MQTT transfer
  save_slice_files: false   # Keep per-slice debug PLY files locally if true
  sor_neighbors: 12         # Statistical outlier filtering neighborhood size
  sor_std_ratio: 1.0        # Larger keeps more points; smaller removes more outliers
  sor_radius_m: 0.08        # Local neighborhood radius in meters for SOR
  sor_max_points: 12000     # Automatic cutoff: skip SOR when point count exceeds this
  sor_max_runtime_s: 2.5    # Automatic cutoff: abort SOR if it exceeds this runtime
  voxel_size_m: 0.01        # Voxel grid size in meters for downsampling

panorama:
  start_deg: 0
  end_deg: 180
  step_deg: 30
  # Panorama uses large angular jumps. Enable dynamic settle scaling from robust_3d reference.
  dynamic_settle: true
  reference_step_deg: 5.3
  min_settle_time: 0.5
  max_settle_time: 3.0
  home_settle_time: 1.0
  
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "./rpi_scanner.log"
