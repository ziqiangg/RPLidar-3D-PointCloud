# Raspberry Pi Scanner Service Configuration

mqtt:
  broker_host: ""  # Laptop IP address CHANGE ACCORDINGLY
  broker_port: 1883
  qos: 1
  
device:
  role: "scanner"
  client_id: "rplidar_scanner_rpi"
  default_port: "/dev/ttyUSB0"  # Linux default
  
# scripts:
#   scan_2d: "./dump_one_scan.py"
  
data:
  output_dir: "./data"
  formats: ["csv", "ply"]  # Generate both formats

servo:
  pin: 18
  min_pulse_width: 0.001
  max_pulse_width: 0.002
  # Physical servo calibration range used for logical azimuth 0..180 mapping.
  # Keep at 0/180 for strict full-range behavior.
  scan_start_angle: 0
  scan_end_angle: 180
  settle_time: 0.08
  release_after_move: false
  reset_settle_time: 0.02
  calibration:
    # If cw command moves wrong way, set this to false.
    cw_increases_angle: false
    # Scale factor to map command-angle movement to real physical movement.
    # Example: if 180 command-deg produces ~60 physical-deg, set to 0.3333.
    physical_deg_per_command_deg: 1.0
    # Smooth motion granularity for set_servo_azimuth.py
    sweep_step_deg: 1.0
    sweep_delay_sec: 0.01
  # Optional continuous-rotation calibration values (reserved for future tuning).
  continuous:
    # Continuous-servo range can be wider than positional 1ms..2ms.
    # set_servo_azimuth.py uses this pulse range first for calibration moves.
    min_pulse_width: 0.0005
    max_pulse_width: 0.0035
    neutral_value: 0.0
    cw_value: 0.9
    ccw_value: -0.9
    deg_per_sec_cw: 120.0
    deg_per_sec_ccw: 120.0

scan3d:
  azimuth_start: 0
  azimuth_end: 180
  azimuth_step: 1
  # Delay between finishing a slice and requesting permission for next step.
  inter_slice_sleep: 1.0
  # Debug mode: require explicit MQTT step command before each next slice.
  step_permission_required: true
  # Anti-jitter: disable PWM holding while waiting for step permission.
  release_while_waiting: true
  min_angle_resolution: 2.0
  min_coverage: 0.80
  relaxed_max_gap: 10.0
  max_scans_to_merge: 20
  plateau_patience: 5
  slice_timeout: 5.0
  lidar_timeout: 1.0
  progress_every_slices: 1
  worker_stall_timeout: 20.0
  buffer_size: 5000
  
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "./rpi_scanner.log"
