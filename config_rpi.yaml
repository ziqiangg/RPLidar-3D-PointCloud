# Raspberry Pi Scanner Service Configuration

mqtt:
  broker_host: ""  # Laptop IP address CHANGE ACCORDINGLY
  broker_port: 1883
  qos: 1
  
device:
  role: "scanner"
  client_id: "rplidar_scanner_rpi"
  default_port: "/dev/ttyUSB0"  # Linux default
  
# scripts:
#   scan_2d: "./dump_one_scan.py"
  
data:
  output_dir: "./data"
  formats: ["csv", "ply"]  # Generate both formats

servo:
  pin: 18
  min_pulse_width: 0.001
  max_pulse_width: 0.002
  # Physical servo calibration range used for logical azimuth 0..180 mapping.
  # Keep at 0/180 for strict full-range behavior.
  scan_start_angle: 0
  scan_end_angle: 180
  settle_time: 0.08
  release_after_move: false
  reset_settle_time: 0.02

scan3d:
  azimuth_start: 0
  azimuth_end: 180
  azimuth_step: 1
  # Delay between finishing a slice and stepping to the next azimuth.
  inter_slice_sleep: 1.0
  # Debug mode: wait for Enter on scanner terminal before each step.
  # In non-interactive service mode, it auto-continues.
  manual_step_mode: true
  min_angle_resolution: 2.0
  min_coverage: 0.80
  relaxed_max_gap: 10.0
  max_scans_to_merge: 20
  plateau_patience: 5
  slice_timeout: 5.0
  lidar_timeout: 1.0
  progress_every_slices: 1
  worker_stall_timeout: 20.0
  buffer_size: 5000
  
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "./rpi_scanner.log"
