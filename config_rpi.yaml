# Raspberry Pi Scanner Service Configuration

mqtt:
  broker_host: ""  # Laptop IP address CHANGE ACCORDINGLY
  broker_port: 1883
  qos: 1
  
device:
  role: "scanner"
  client_id: "rplidar_scanner_rpi"
  default_port: "/dev/ttyUSB0"  # Linux default
  
# scripts:
#   scan_2d: "./dump_one_scan.py"
  
data:
  output_dir: "./data"
  formats: ["csv", "ply"]  # Generate both formats

servo:
  pin: 18
  # Pulse width calibration from one_increment_test.py
  min_pulse_width: 0.0005  # 0.5ms
  max_pulse_width: 0.0025  # 2.5ms
  # Physical and operational servo limits (from one_increment_test.py calibration)
  physical_min: -90   # Physical minimum (hardware limit)
  physical_max: 90    # Physical maximum (hardware limit)
  operational_min: -75  # Calibrated operational start (produces 0° physical)
  operational_max: 87   # Calibrated operational end (produces 180° physical)
  step_size: 18        # Command angle step (produces 20° physical movement)
  step_delay: 0.5      # Delay after servo movement (seconds) - increased for 20° settling
  # Legacy scan range (deprecated - use operational range above)
  scan_start_angle: 0
  scan_end_angle: 180
  settle_time: 0.08
  release_after_move: false
  reset_settle_time: 0.02
  calibration:
    # If cw command moves wrong way, set this to false.
    cw_increases_angle: false
    # Scale factor to map command-angle movement to real physical movement.
    # Example: if 180 command-deg produces ~60 physical-deg, set to 0.3333.
    physical_deg_per_command_deg: 1.0
    # Deadband helper: enforce at least this much command-angle change per step.
    # Set to 0 to disable. Increase if 1° commands do not physically move.
    min_command_step_deg: 2.0
    # Smooth motion granularity for set_servo_azimuth.py
    sweep_step_deg: 1.0
    sweep_delay_sec: 0.01
    # Keep PWM active briefly after the final command so small steps can settle.
    final_settle_sec: 0.15
  # Optional continuous-rotation calibration values (reserved for future tuning).
  continuous:
    # Continuous-servo range can be wider than positional 1ms..2ms.
    # set_servo_azimuth.py uses this pulse range first for calibration moves.
    min_pulse_width: 0.0005
    max_pulse_width: 0.0035
    neutral_value: 0.0
    cw_value: 0.9
    ccw_value: -0.9
    deg_per_sec_cw: 120.0
    deg_per_sec_ccw: 120.0

scan3d:
  # 3D scan configuration (9 steps × 20° physical = 180° sweep)
  num_steps: 9          # Total number of azimuth steps
  physical_step_deg: 20  # Physical angular step between slices (degrees)
  # Delay between finishing a slice and requesting permission for next step.
  inter_slice_sleep: 2.0  # Increased to ensure motor fully stops between slices
  # Automatic mode: 3D scan runs fully automatically (no manual step commands needed)
  step_permission_required: false
  # Anti-jitter: disable PWM holding while waiting for step permission.
  release_while_waiting: true
  # Per-slice scan quality parameters (optimized for maximum coverage)
  min_angle_resolution: 1.0  # 1-degree bins for finer resolution
  min_coverage: 0.70  # Target 70% coverage (252° of 360°)
  relaxed_max_gap: 15.0  # Maximum acceptable gap between points (degrees)
  max_scans_to_merge: 40  # Merge up to 40 scans for dense coverage
  plateau_patience: 10  # Wait for 10 plateau iterations before accepting
  slice_timeout: 60.0  # 60 seconds per slice for thorough coverage
  lidar_timeout: 3.0
  progress_every_slices: 1
  min_distance_mm: 50  # Filter points closer than 50mm
  min_quality: 10  # Minimum quality threshold (0-15 scale)
  motor_pwm: 300  # Motor speed (0-1023, default=660, lower=slower=denser scans)
  worker_stall_timeout: 20.0
  buffer_size: 5000
  
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "./rpi_scanner.log"
